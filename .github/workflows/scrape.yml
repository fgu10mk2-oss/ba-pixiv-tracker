name: スクレイピング実行

on:
  workflow_dispatch:
    inputs:
      update_limit:
        description: '更新するキャラ数'
        required: false
        default: '1'
  schedule:
    - cron: '0 18 * * 0'  # 毎週日曜 午前3時JST

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Chrome と ChromeDriver インストール
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+')
          echo "Chrome version: $CHROME_VERSION"
          pip install --upgrade selenium webdriver-manager

      - name: スクレイピング実行
        id: scrape
        env:
          UPDATE_LIMIT: ${{ github.event.inputs.update_limit || '1' }}
        run: python run_scrape.py
        continue-on-error: true

      - name: CSVをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/result.csv
          git diff --cached --quiet && echo "変更なし" && exit 0
          git commit -m "Update result.csv [$(date '+%Y-%m-%d %H:%M')] (scrape: ${{ steps.scrape.outcome }})"
          git push

      - name: スクレイピング結果を確認
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "⚠️ スクレイピングが中断されましたが、処理済みCSVは保存しました。"
            exit 1
          fi
