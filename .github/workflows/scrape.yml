name: スクレイピング実行

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'  # 毎週日曜 午前3時JST

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Chrome インストール
        uses: browser-actions/setup-chrome@v1

      - name: スクレイピング実行
        id: scrape
        run: python run_scrape.py
        continue-on-error: true  # ブロックで失敗しても次のステップに進む

      - name: CSVをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/result.csv
          git diff --cached --quiet || git commit -m "Update result.csv [$(date '+%Y-%m-%d %H:%M')] (scrape: ${{ steps.scrape.outcome }})"
          git push

      - name: スクレイピング結果を確認
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "⚠️ スクレイピングがブロックにより中断されましたが、処理済みCSVは保存しました。"
            exit 1
          fi
