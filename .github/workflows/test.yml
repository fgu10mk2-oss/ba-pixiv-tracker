name: 接続テスト

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install selenium webdriver-manager

      - name: Chrome インストール
        uses: browser-actions/setup-chrome@v1

      - name: Selenium で大百科テスト
        run: python test_selenium.py
